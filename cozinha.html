<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel de Pedidos - Bella Napoli Pizzaria</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .kanban-col::-webkit-scrollbar { width: 6px; }
        .kanban-col::-webkit-scrollbar-thumb { background-color: #cbd5e1; border-radius: 10px; }
    </style>
</head>
<body class="bg-slate-100 h-screen flex flex-col font-sans overflow-hidden">

    <header class="bg-red-600 text-white p-4 shadow-md flex flex-col sm:flex-row justify-between items-center gap-4 z-10">
        <div class="flex items-center gap-3">
            <span class="text-2xl">🍕</span>
            <h1 class="text-xl font-bold text-center sm:text-left">Bella Napoli - Gestão de Pedidos</h1>
        </div>
        <div class="flex items-center gap-4 w-full sm:w-auto justify-between sm:justify-end">
            <div class="flex items-center gap-2">
                <span class="relative flex h-3 w-3">
                  <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-green-400 opacity-75"></span>
                  <span class="relative inline-flex rounded-full h-3 w-3 bg-green-500"></span>
                </span>
                <span class="font-medium text-sm sm:text-base">Loja Aberta</span>
            </div>
            <div id="relogio" class="font-mono text-base sm:text-lg font-bold bg-red-700 px-3 py-1 rounded">--:--:--</div>
        </div>
    </header>

    <main class="flex-1 flex flex-col md:flex-row gap-6 p-4 sm:p-6 overflow-y-auto md:overflow-hidden">
        <section class="flex-1 flex flex-col bg-white rounded-lg shadow-sm border border-gray-200 min-h-[400px] md:min-h-0">
            <div class="p-4 border-b border-gray-200 bg-blue-50 rounded-t-lg flex justify-between items-center sticky top-0 z-10">
                <h2 class="font-bold text-blue-800 text-base sm:text-lg">Novos Pedidos</h2>
                <span id="count-novos" class="bg-blue-600 text-white text-xs font-bold px-2 py-1 rounded-full">0</span>
            </div>
            <div id="col-novos" class="kanban-col flex-1 p-4 overflow-y-auto space-y-4 bg-gray-50"></div>
        </section>

        <section class="flex-1 flex flex-col bg-white rounded-lg shadow-sm border border-gray-200 min-h-[400px] md:min-h-0">
            <div class="p-4 border-b border-gray-200 bg-yellow-50 rounded-t-lg flex justify-between items-center sticky top-0 z-10">
                <h2 class="font-bold text-yellow-800 text-base sm:text-lg">Em Preparo</h2>
                <span id="count-preparo" class="bg-yellow-500 text-white text-xs font-bold px-2 py-1 rounded-full">0</span>
            </div>
            <div id="col-preparo" class="kanban-col flex-1 p-4 overflow-y-auto space-y-4 bg-gray-50"></div>
        </section>

        <section class="flex-1 flex flex-col bg-white rounded-lg shadow-sm border border-gray-200 min-h-[400px] md:min-h-0">
            <div class="p-4 border-b border-gray-200 bg-green-50 rounded-t-lg flex justify-between items-center sticky top-0 z-10">
                <h2 class="font-bold text-green-800 text-base sm:text-lg">Prontos / Despacho</h2>
                <span id="count-prontos" class="bg-green-600 text-white text-xs font-bold px-2 py-1 rounded-full">0</span>
            </div>
            <div id="col-prontos" class="kanban-col flex-1 p-4 overflow-y-auto space-y-4 bg-gray-50"></div>
        </section>
    </main>

    <script>
        const API_URL = 'https://backend-haruy.vercel.app'; 
        let pedidos = [];

        async function carregarPedidosDB() {
            try {
                const response = await fetch(`${API_URL}/api/pedidos`);
                const data = await response.json();

                pedidos = data.map(p => ({
                    id: p.id.toString(),
                    cliente: p.cliente,
                    itens: p.itens,
                    tipo: p.tipo_entrega || 'Delivery',
                    total: `R$ ${p.total.toFixed(2).replace('.', ',')}`,
                    hora: new Date(p.created_at).toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit' }),
                    status: p.status
                }));

                renderizarPedidos();
            } catch (error) {
                console.error("Erro ao conectar com o servidor:", error);
            }
        }

        function renderizarPedidos() {
            const colNovos = document.getElementById('col-novos');
            const colPreparo = document.getElementById('col-preparo');
            const colProntos = document.getElementById('col-prontos');

            colNovos.innerHTML = '';
            colPreparo.innerHTML = '';
            colProntos.innerHTML = '';

            let contadores = { novo: 0, preparando: 0, pronto: 0 };

            pedidos.forEach(pedido => {
                if (contadores[pedido.status] !== undefined) {
                    contadores[pedido.status]++;
                    const cardHTML = criarCardPedido(pedido);
                    
                    if (pedido.status === 'novo') colNovos.innerHTML += cardHTML;
                    else if (pedido.status === 'preparando') colPreparo.innerHTML += cardHTML;
                    else if (pedido.status === 'pronto') colProntos.innerHTML += cardHTML;
                }
            });

            document.getElementById('count-novos').innerText = contadores.novo;
            document.getElementById('count-preparo').innerText = contadores.preparando;
            document.getElementById('count-prontos').innerText = contadores.pronto;
        }

        function criarCardPedido(pedido) {
            const itensLista = pedido.itens.map(item => `<li class="text-sm text-gray-600 border-b border-gray-100 pb-1">${item}</li>`).join('');
            const tipoColor = pedido.tipo === 'Delivery' ? 'bg-purple-100 text-purple-800' : 'bg-orange-100 text-orange-800';
            
            let botoesHTML = '';
            if (pedido.status === 'novo') {
                botoesHTML = `
                    <button onclick="mudarStatus('${pedido.id}', 'preparando')" class="flex-1 bg-green-500 hover:bg-green-600 text-white py-2 px-2 rounded text-sm font-medium transition">Aceitar</button>
                    <button onclick="recusarPedido('${pedido.id}')" class="bg-red-100 hover:bg-red-200 text-red-600 px-3 py-2 rounded text-sm font-medium transition">Recusar</button>
                `;
            } else if (pedido.status === 'preparando') {
                botoesHTML = `<button onclick="mudarStatus('${pedido.id}', 'pronto')" class="w-full bg-blue-500 hover:bg-blue-600 text-white py-2 rounded font-medium transition">Marcar como Pronto</button>`;
            } else if (pedido.status === 'pronto') {
                const acaoTexto = pedido.tipo === 'Delivery' ? 'Despachar' : 'Entregue';
                botoesHTML = `<button onclick="finalizarPedido('${pedido.id}')" class="w-full bg-slate-800 hover:bg-slate-900 text-white py-2 rounded font-medium transition">${acaoTexto}</button>`;
            }

            return `
                <div class="bg-white p-4 rounded-lg shadow-sm border border-gray-200 hover:shadow-md transition">
                    <div class="flex justify-between items-start mb-2">
                        <div>
                            <h3 class="font-bold text-gray-800 text-lg">#${pedido.id}</h3>
                            <span class="text-xs font-semibold px-2 py-0.5 rounded ${tipoColor}">${pedido.tipo}</span>
                        </div>
                        <span class="text-sm text-gray-500 font-medium bg-gray-100 px-2 py-1 rounded">${pedido.hora}</span>
                    </div>
                    <div class="my-3">
                        <p class="font-medium text-gray-800">${pedido.cliente}</p>
                    </div>
                    <ul class="space-y-1 mb-4">${itensLista}</ul>
                    <div class="flex justify-between items-center mb-4">
                        <span class="text-sm text-gray-500">Total:</span>
                        <span class="font-bold text-gray-800">${pedido.total}</span>
                    </div>
                    <div class="flex gap-2">${botoesHTML}</div>
                </div>
            `;
        }

        async function mudarStatus(id, novoStatus) {
            try {
                await fetch(`${API_URL}/api/pedidos/${id}`, {
                    method: 'PATCH',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ status: novoStatus })
                });
                carregarPedidosDB();
            } catch (error) { console.error(error); }
        }

        async function recusarPedido(id) {
            if(!confirm('Recusar pedido #' + id + '?')) return;
            try {
                await fetch(`${API_URL}/api/pedidos/${id}`, { method: 'DELETE' });
                carregarPedidosDB();
            } catch (error) { console.error(error); }
        }

        async function finalizarPedido(id) {
            mudarStatus(id, 'finalizado');
        }

        function atualizarRelogio() {
            document.getElementById('relogio').innerText = new Date().toLocaleTimeString('pt-BR');
        }

        setInterval(atualizarRelogio, 1000);
        setInterval(carregarPedidosDB, 10000); 
        atualizarRelogio();
        carregarPedidosDB();
    </script>
</body>
</html>
